<html>
  <head>
    <link rel="stylesheet" href="style-contact-us-page.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="iPOTS-logo.png" />
    <title>Login Page: iPOTS Swimming Reminder App - 2026</title>
    <link rel="stylesheet" href="style-login-page.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="login-word">Login</h1>
      <img
        src="loader-logo.png"
        width="120"
        height="100"
        id="login-page-logo"
      />
      <div id="username-details">
        <label id="username-word">Username</label>
        <input type="text" id="username" placeholder="Enter your username" />
        <img src="user-picture.png" height="25" width="25" />
      </div>
      <div id="password-details">
        <label id="password-word">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
        />
        <img src="padlock-picture.png" height="25" width="25" />
      </div>
      <input type="button" id="submit" value="Login" />
      <div id="registration-details">
        <label id="sentence-register"
          >Don't have an account?
          <span id="register-word">Register</span></label
        >
      </div>
      <div id="register-platforms">
        <img src="apple-logo.png" height="35" width="35" id="apple-logo" />
        <img src="google-logo.png" height="35" width="35" id="google-logo" />
        <img
          src="facebook-logo.png"
          height="35"
          width="35"
          id="facebook-logo"
        />
      </div>
    </div>
    <script src="function-login-page.js"></script>
  </body>
</html>
