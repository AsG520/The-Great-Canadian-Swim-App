<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="iPOTS-logo.png" />
    <title>Login Page: The Great Canadian Swim App - 2026</title>
    <link rel="stylesheet" href="style-login-page.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="login-word">Login</h1>
      <img
        src="loader-logo.png"
        width="120"
        height="100"
        id="login-page-logo"
        alt="Picture of Great Canadian Swim logo."
      />
      <div id="username-details">
        <div id="customAlert" class="alertBox">
          <label id="alertText"></label>
        </div>
        <div class="username-header">
          <label id="username-word">Email</label>
          <img
            src="user-picture.png"
            height="25"
            width="25"
            alt="Picture of user logo."
          />
        </div>
        <input
          type="email"
          id="email"
          placeholder="Enter your email"
          alt="Textbox of email."
        />
      </div>
      <br />
      <div id="password-details">
        <div class="password-header">
          <label id="password-word">Password</label>
          <img
            src="padlock-picture.png"
            height="25"
            width="25"
            alt="Picture of lock logo."
          />
        </div>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          alt="Textbox of password."
        />
      </div>
      <h4 id="forgot-password-word">Forgot Password?</h4>
      <input type="button" id="submitSignIn" value="Login" />
      <div id="registration-details">
        <h4 id="sentence-register">
          Don't have an account?<br /><span id="register-word">Register</span>
        </h4>
      </div>
      <br />
      <img
        src="google-logo.png"
        height="35"
        width="35"
        id="googleSignIn"
        alt="Picture of Google logo."
      />
    </div>
    <br />
    <a href="app-terms-of-use.pdf" target="_blank">
      <div id="footer-details">Privacy Policy / Terms of Use / Disclaimer</div>
    </a>
    <script type="module" src="firebaseauth.js"></script>
    <script type="module" src="function-login-page.js"></script>
  </body>
</html>
