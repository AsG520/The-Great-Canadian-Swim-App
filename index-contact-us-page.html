<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style-contact-us-page.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="iPOTS-logo.png" />
    <title>Contact Us Page: The Great Canadian Swim App - 2026</title>
  </head>
  <body>
    <div id="information-details">
      <div id="social-details">
        <div id="socials-word">📱 Socials</div>
        <a href="https://www.tiktok.com/improvingpots"
          ><img
            src="tiktok-logo.png"
            width="45"
            height="45"
            id="tiktok-picture"
            alt="Picture of TikTok logo."
        /></a>
        <a href="https://www.instagram.com/improvingpots"
          ><img
            src="instagram-logo.png"
            width="45"
            height="45"
            id="instagram-picture"
            alt="Picture of Instagram logo."
        /></a>
        <a href="https://www.twitter.com/improvingpots"
          ><img
            src="twitter-logo.png"
            width="45"
            height="45"
            id="twitter-picture"
            alt="Picture of Twitter logo."
        /></a>
      </div>
      <div id="phone-details">
        <div id="phone-word">📞 Phone</div>
        <br />
        <a href="wa.me/4165509762" id="phone-number">+1 (416) 550 - 9762</a>
      </div>
      <div id="email-details">
        <div id="email-word-box">📧 Email</div>
        <br />
        <a href="mailto:steffmanica@gmail.com" id="email-address"
          >steffimanica@gmail.com</a
        >
      </div>
    </div>
    <div class="container">
      <h1 id="contact-us-word">Contact Us</h1>
      <img
        src="loader-logo.png"
        width="120"
        height="100"
        id="contact-us-page-logo"
        alt="Picture of Great Canadian Swim logo."
      />
      <br />
      <label id="name-word">👋 Name</label>
      <input
        type="text"
        id="name"
        placeholder="Enter your name"
        alt="Textbox of name."
      />
      <br />
      <label id="email-word">📩 Email</label>
      <input
        type="text"
        id="email"
        placeholder="Enter your email address"
        alt="Textbox of email."
      />
      <br />
      <label id="subject-word">📝 Subject</label>
      <input
        type="text"
        id="subject"
        placeholder="Enter a subject for your message"
        alt="Textbox of message subject."
      />
      <br />
      <label id="message-word">✏️ Message</label>
      <input
        type="text"
        id="message"
        placeholder="Enter your message"
        alt="Textbox of message."
      />
      <br />
      <button id="send">Send</button>
    </div>
    <br />
    <a href="app-terms-of-use.pdf" target="_blank">
      <div id="footer-details">Privacy Policy / Terms of Use / Disclaimer</div>
    </a>
    <script src="function-contact-us-page.js"></script>
  </body>
</html>
