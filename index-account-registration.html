<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="logo.png" />
    <title>Account Registration Page: The Great Canadian Swim App - 2026</title>
    <link rel="stylesheet" href="style-account-registration.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="account-registration-word">Account<br />Registration</h1>
      <br />
      <img
        src="loader-logo.png"
        width="120"
        height="100"
        id="account-registration-logo"
        alt="Picture of Great Canadian Swim logo."
      />
      <div id="customAlert" class="alertBox">
        <label id="alertText"></label>
      </div>
      <div class="first-name-details">
        <label id="first-name-word">👤 First Name</label>
        <input
          type="text"
          id="fName"
          placeholder="Enter your first name"
          alt="Textbox of name."
        />
      </div>
      <br />
      <div class="email-details">
        <label id="email-word">📧 Email</label>
        <input
          type="text"
          id="rEmail"
          placeholder="Enter your email address"
          alt="Textbox of email."
        />
      </div>
      <br />
      <div class="password-details">
        <label id="password-word">🔒 Password</label>
        <input
          type="password"
          id="rPassword"
          placeholder="Enter your password"
          alt="Textbox of password."
        />
      </div>
      <br />
      <input type="button" id="submitSignUp" value="Sign Up" />
      <div id="sign-in-platforms">
        <img
          src="google-logo.png"
          height="35"
          width="35"
          id="googleSignIn"
          alt="Picture of Google logo."
        />
      </div>
      <br />
      <h4 id="already-have-account-sentence">
        Already have an Account! <span id="login-word"><br />Login</span>
      </h4>
    </div>
    <br />
    <a href="app-terms-of-use.pdf" target="_blank">
      <div id="footer-details">Privacy Policy / Terms of Use / Disclaimer</div>
    </a>
    <script type="module" src="firebaseauth.js"></script>
    <script src="function-account-registration.js"></script>
  </body>
</html>
