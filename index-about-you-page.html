<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="iPOTS-logo.png" />
    <title>About You Page: iPOTS Swimming Reminder App - 2026</title>
    <link rel="stylesheet" href="style-about-you-page.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="about-you-word">Tell Us About You</h1>
      <h4 id="description">
        This helps us personalize<br />
        your experience.
      </h4>
      <img
        src="loader-logo.png"
        width="120"
        height="100"
        id="about-you-logo"
        alt="Picture of Great Canadian Swim logo."
      />
      <br />
      <div class="disability-details">
        <input type="checkbox" id="disability-checkbox" />
        <input
          type="button"
          value="♿ I live with a Disability"
          id="disability-option"
        />
      </div>
      <br />
      <div class="parent-caregiver-details">
        <input type="checkbox" id="parent-caregiver-checkbox" />
        <input
          type="button"
          value="👪 I am a Parent / Caregiver"
          id="parent-caregiver-option"
        />
      </div>
      <br />
      <div class="supporter-details">
        <input type="checkbox" id="supporter-checkbox" />
        <input
          type="button"
          value="👏 I am a Supporter"
          id="supporter-option"
        />
      </div>
      <br />
      <div class="club-coach-details">
        <input type="checkbox" id="club-coach-checkbox" />
        <input
          type="button"
          value="🏊‍♂️ Swim Club / Coach"
          id="club-coach-option"
        />
      </div>
      <br />
      <div class="education-details">
        <input type="checkbox" id="education-checkbox" />
        <input
          type="button"
          value="🎒 School / Student"
          id="education-option"
        />
      </div>
      <br />
      <div class="organization-details">
        <input type="checkbox" id="organization-checkbox" />
        <input
          type="button"
          value="🏢 Corporate / Organization"
          id="organization-option"
        />
      </div>
      <br />
      <input type="button" value="Continue" id="continue" />
    </div>
    <br />
    <a href="app-terms-of-use.pdf" target="_blank">
      <div id="footer-details">Privacy Policy / Terms of Use / Disclaimer</div>
    </a>
    <script src="function-about-you-page.js"></script>
  </body>
</html>
