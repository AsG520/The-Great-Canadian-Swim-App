<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="iPOTS-logo.png" />
    <title>Welcome Page: The Great Canadian Swim App - 2026</title>
    <link rel="stylesheet" href="style-welcome-page.css" />
  </head>
  <body>
    <div class="container">
      <h1 id="about-you-word">Welcome!</h1>
      <h4 id="description">You're part of something<br />bigger.</h4>
      <div class="header-pictures">
        <img
          src="map-of-canada.png"
          width="235"
          height="200"
          id="map-of-canada-picture"
          alt="Picture of Canada map."
        />
        X
        <img
          src="loader-logo.png"
          width="120"
          height="100"
          id="welcome-page-logo"
          alt="Picture of Great Canadian Swim logo."
        />
      </div>
      <input
        type="button"
        value="🌍 Swim across Canada"
        id="swim-across-canada-option"
      />
      <br />
      <input
        type="button"
        value="⛏️ Build Community"
        id="build-community-option"
      />
      <br />
      <input
        type="button"
        value="🥇 Make a Difference"
        id="make-a-difference-option"
      />
      <br />
      <input type="button" value="Create an Account" id="create-an-account" />
      <br />
      <input type="button" value="Sign In" id="sign-in" />
    </div>
    <br />
    <a href="app-terms-of-use.pdf" target="_blank">
      <div id="footer-details">Privacy Policy / Terms of Use / Disclaimer</div>
    </a>
    <script src="function-welcome-page.js"></script>
  </body>
</html>
