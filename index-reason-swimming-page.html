<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style-reason-swimming-page.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="iPOTS-logo.png" />
    <title>Reason Swimming Page: iPOTS Swimming Reminder App - 2026</title>
  </head>
  <div class="container">
    <h1 id="whats-your-reason-for-swimming-word">
      What's your reason for swimming?
    </h1>
    <h4 id="description">
      Your "why" is what keeps you<br />going when it gets tough.
    </h4>
    <img
      src="loader-logo.png"
      width="120"
      height="100"
      id="reason-swimming-logo"
      alt="Picture of Great Canadian Swim logo."
    />
    <br />
    <label id="write-your-reason-word">Write your reason</label>
    <input
      type="text"
      id="reason"
      maxlength="29"
      alt="Textbox of reason."
      placeholder="Enter you reason"
    />
    <br />
    <div class="profile-details">
      <input type="checkbox" alt="Checkbox of reason." id="profile-checkbox" />
      <label id="profile-choose"
        >This will be displayed on<br />your profile if you choose./label
      ><
      <br>
      <div class="private-details">
      <input type="checkbox" alt="Checkbox of private" id="private-checkbox">
      <label id="private-choose">Keep this private.</label>
      </div>
    </div>
    <br />
    <input type="button" id="continue" value="Continue" />
  </div>
  <br />
  <a href="app-terms-of-use.pdf" target="_blank">
    <div id="footer-details">Privacy Policy / Terms of Use / Disclaimer</div>
  </a>
  <script type="module" src="function-reason-swimming-page.js"></script>
</html>
