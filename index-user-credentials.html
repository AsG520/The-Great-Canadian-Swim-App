<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style-user-credentials.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="logo.png" />
    <title>User Credentials Page: The Great Canadian Swim App - 2026</title>
  </head>
  <body>
    <div class="container">
      <h1 id="user-credentials-word">User Credentials</h1>
      <img
        src="loader-logo.png"
        width="120"
        height="100"
        id="user-credentials-logo"
        alt="Picture of Great Canadian Swim logo."
      />
      <div id="customAlert" class="alertBox">
        <label id="alertText"></label>
      </div>
      <div class="name-details">
        <label id="username-word">📄 Username</label>
        <input
          type="text"
          id="username"
          placeholder="Enter your username"
          alt="Textbox of username."
        />
      </div>
      <br />
      <label id="age-word">🔢 Age</label>
      <input
        type="number"
        id="age-number"
        placeholder="Enter your age"
        min="0"
        max="100"
        alt="Textbox of age."
        oninput="this.value = Math.abs(this.value)"
      />
      <br />
      <label id="gender-word">🚻 Gender</label>
      <select id="gender-details">
        <option>Select your gender</option>
        <option>Female</option>
        <option>Male</option>
        <option>Non-Binary</option>
        <option>Other</option>
        <option>Prefer Not to Say</option>
      </select>
      <br />
      <label id="height-word">📏 Height</label>
      <input
        type="number"
        id="height-details"
        placeholder="Enter your height in centimeters"
        min="0"
        alt="Textbox of height."
        oninput="this.value = Math.abs(this.value)"
      />
      <br />
      <label id="weight-word">💪 Weight</label>
      <input
        type="number"
        id="weight-details"
        min="0"
        placeholder="Enter your weight in pounds"
        alt="Textbox of weight."
        oninput="this.value = Math.abs(this.value)"
      />
      <br />
      <input type="button" id="submit" value="Submit" />
    </div>
    <br />
    <a href="app-terms-of-use.pdf" target="_blank">
      <div id="footer-details">Privacy Policy / Terms of Use / Disclaimer</div>
    </a>
    <script type="module" src="function-user-credentials.js"></script>
  </body>
</html>
