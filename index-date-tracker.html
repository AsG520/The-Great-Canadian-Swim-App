<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style-date-tracker.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="logo.png" />
    <title>Date Tracker Page: The Great Canadian Swim App - 2026</title>
  </head>
  <body>
    <div class="container">
      <h1 id="date-tracker-word">Date Tracker</h1>
      <img
        src="loader-logo.png"
        width="120"
        height="100"
        id="date-tracker-logo"
        alt="Picture of Great Canadian Swim logo."
      />
      <h4 id="description">Your progress over the<br />period of time!</h4>
      <label id="today-word">Today</label>
      <input
        type="number"
        id="today-distance"
        readonly
        value="0"
        alt="Textbox of today distance."
      />
      <br />
      <label id="weekly-word">Weekly</label>
      <input
        type="number"
        id="week-distance"
        readonly
        value="0"
        alt="Textbox of weekly distance."
      />
      <br />
      <label id="monthly-word">Monthly</label>
      <input
        type="number"
        id="month-distance"
        readonly
        value="0"
        alt="Textbox of monthly distance."
      />
      <br />
      <label id="yearly-word">Yearly</label>
      <input
        type="number"
        id="year-distance"
        readonly
        value="0"
        alt="Textbox of yearly distance."
      />
      <br />
      <input type="button" value="Ok" id="ok" />
    </div>
    <br />
    <a href="app-terms-of-use.pdf" target="_blank">
      <div id="footer-details">Privacy Policy / Terms of Use / Disclaimer</div>
    </a>
    <script type="module" src="function-date-tracker.js"></script>
  </body>
</html>
