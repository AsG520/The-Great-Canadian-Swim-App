<html>
  <head>
    <link rel="stylesheet" href="style-date-tracker.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="iPOTS-logo.png" />
    <title>Date Tracker Page: iPOTS Swimming Reminder App - 2026</title>
    <link rel="stylesheet" href="style-date-tracker.css" />
  </head>
  <body>
    <div class="container">
      <h1>Date Tracker</h1>
      <img
        src="loader-logo.png"
        width="70"
        height="70"
        id="date-tracker-logo"
      />
      <div id="km-today">
        <input type="text" value="0" id="today-collector" readonly />
        <br />
        <div id="word-km-today">km ● Today</div>
      </div>
      <div id="km-yesterday">
        <div id="word-km-yesterday">km ● Yesterday</div>
        <br />
        <input type="text" value="0" id="yesterday-collector" readonly />
      </div>
      <div id="km-this-week">
        <div id="word-km-this-week">km ● This Week</div>
        <br />
        <input type="text" value="0" id="week-collector" readonly />
      </div>
      <div id="km-this-month">
        <div id="word-km-this-month">km ● This Month</div>
        <br />
        <input type="text" value="0" id="month-collector" readonly />
      </div>
      <div id="km-this-year">
        <div id="word-km-this-year">km ● This Year</div>
        <br />
        <input type="text" value="0" id="year-collector" readonly />
      </div>
    </div>
    <div id="footer-details">Privacy Policy / Terms of Use / Disclaimer</div>
    <script src="function-date-tracker.js"></script>
  </body>
</html>
